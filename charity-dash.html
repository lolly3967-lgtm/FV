<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الجمعيات | لا تهدرها</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #2e7d32;
            --orange: #ff7a00;
            --dark-panel: #1a1a1a;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: #f4f4f4;
            overflow: hidden;
        }

        .map-layout {
            display: flex;
            height: 100vh;
        }

        /* اللوحة الجانبية */
        .side-panel {
            width: 350px;
            background: var(--dark-panel);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .panel-header {
            padding: 25px 20px;
            border-bottom: 1px solid #333;
        }

        .btn-back-small {
            text-decoration: none;
            background: #333;
            color: #ccc;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-back-small:hover { background: var(--orange); color: white; }

        .notif-box {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 10px;
            margin: 15px;
            font-size: 13px;
            border-right: 4px solid #ffeeba;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .offers-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 20px;
        }

        .offer-card {
            background: #262626;
            color: white;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .offer-card:hover {
            border-color: var(--green);
            background: #2d2d2d;
        }

        .badge {
            background: var(--green);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            background: var(--green);
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { background: #1b5e20; }

        #map-char {
            flex: 1;
            height: 100%;
        }

        /* زر التبديل للجوال */
        .mobile-nav-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2001;
            background: var(--orange);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* --- تعديلات الجوال --- */
        @media (max-width: 768px) {
            .side-panel {
                width: 100%;
                height: 45vh;
                position: fixed;
                bottom: 0;
                border-radius: 25px 25px 0 0;
            }
            #map-char { height: 55vh; width: 100%; }
            .mobile-nav-btn { display: block; }
            .panel-header { padding: 15px; }
        }
    </style>
</head>

<body>

<button class="mobile-nav-btn" onclick="toggleMap()">📍 عرض الخريطة</button>

<div class="map-layout">

    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;">🏢 بوابة الجمعيات</h3>
                <a href="login.html" class="btn-back-small">تسجيل خروج</a>
            </div>
            <div class="notif-box">
                🔔 <strong>تنبيه:</strong> هناك 20 وجبة جديدة بانتظار الاستلام.
            </div>
        </div>

        <div class="offers-container">
            <div class="offer-card" onclick="focusMap(21.5892, 39.1511)">
                <span class="badge">وجبات مطبوخة</span>
                <h4 style="margin: 10px 0 5px;">مطعم حي السلامة</h4>
                <p style="font-size: 13px; color: #aaa; margin: 0;">📦 20 وجبة عائلية</p>
                <button class="btn-action" onclick="confirmPickup(event, 'مطعم حي السلامة')">تأكيد الاستلام</button>
            </div>

            <div class="offer-card" onclick="focusMap(21.55, 39.18)">
                <span class="badge">مخبوزات</span>
                <h4 style="margin: 10px 0 5px;">مخبز البيك</h4>
                <p style="font-size: 13px; color: #aaa; margin: 0;">📦 15 سلة خبز مشكل</p>
                <button class="btn-action" onclick="confirmPickup(event, 'مخبز البيك')">تأكيد الاستلام</button>
            </div>
        </div>
    </div>

    <div id="map-char"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map-char').setView([21.5433, 39.1728], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // إضافة النقاط بماركر برتقالي للتمييز
    var marker1 = L.marker([21.5892, 39.1511]).addTo(map).bindPopup("مطعم حي السلامة");
    var marker2 = L.marker([21.55, 39.18]).addTo(map).bindPopup("مطعم البيك");

    function focusMap(lat, lng) {
        map.setView([lat, lng], 15);
        if(window.innerWidth < 768) {
            // تصغير القائمة لرؤية الخريطة بوضوح عند النقر
            document.getElementById('sidePanel').style.height = "100px";
        }
    }

    function toggleMap() {
        let panel = document.getElementById('sidePanel');
        if (panel.style.height === "100px") {
            panel.style.height = "45vh";
        } else {
            panel.style.height = "100px";
        }
    }

    function confirmPickup(e, name) {
        e.stopPropagation();
        if(confirm("هل أنت متأكد من قدرة الجمعية على استلام الوجبات من " + name + " الآن؟")) {
            alert("✅ رائع! تم إرسال إشعار للمطعم، المندوب الخاص بكم مسجل الآن للاستلام.");
        }
    }
</script>

</body>
</html>
