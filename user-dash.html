<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة الأفراد | لا تهدرها</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #2d5a3f;
            --orange: #ff7a00;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden; /* لمنع التمرير المزدوج */
        }

        .map-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* اللوحة الجانبية - تتحول للوحة سفلية في الجوال */
        .side-panel {
            width: 360px;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .panel-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .offers-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fdfdfd;
        }

        .btn-back-small {
            text-decoration: none;
            background: #eee;
            color: #333;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .cart-box {
            background: var(--green);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .offer-card {
            background: white;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .offer-card:hover { border-color: var(--orange); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 5px;
            color: white;
            text-transform: uppercase;
        }
        .sale { background: var(--green); }
        .new-badge { background: var(--orange); }

        .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: var(--green);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #map-user {
            flex: 1;
            height: 100%;
            z-index: 1;
        }

        /* زر الجوال للتبديل بين القائمة والخريطة */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: var(--dark);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Tajawal';
        }

        /* --- تعديلات الجوال --- */
        @media (max-width: 768px) {
            .map-layout { flex-direction: column; }

            .side-panel {
                width: 100%;
                height: 50vh; /* تأخذ نصف الشاشة في الجوال */
                position: fixed;
                bottom: 0;
                border-radius: 20px 20px 0 0;
            }

            #map-user {
                height: 100vh;
                width: 100vw;
            }

            .mobile-toggle { display: block; background: #333; }
            
            .side-panel.collapsed {
                transform: translateY(calc(100% - 60px)); /* إخفاء القائمة مع إبقاء الهيدر */
            }
        }
    </style>
</head>

<body>

<button class="mobile-toggle" onclick="togglePanel()">القائمة / الخريطة</button>

<div class="map-layout">

    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <a href="login.html" class="btn-back-small">🏠 خروج</a>
            <h3 style="margin: 5px 0;">🍽️ العروض المتاحة في جدة</h3>
            <div class="cart-box">
                <span>🛒 السلة</span>
                <span id="cart-count">0</span>
            </div>
        </div>

        <div class="offers-list">
            <div class="offer-card" onclick="focusMap(21.4858, 39.1925)">
                <span class="badge sale">خصم 50%</span>
                <h4>كافيه حي الشاطئ</h4>
                <p>15 ريال</p>
                <button class="btn-action" onclick="order(event, 'كافيه حي الشاطئ')">طلب الآن</button>
            </div>

            <div id="dynamic-offers-container">
                </div>
        </div>
    </div>

    <div id="map-user"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map-user').setView([21.4858, 39.1925], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.marker([21.4858, 39.1925]).addTo(map).bindPopup("كافيه حي الشاطئ");

    let cart = 0;

    function togglePanel() {
        document.getElementById('sidePanel').classList.toggle('collapsed');
    }

    function focusMap(lat, lng) {
        map.setView([lat, lng], 15);
        if(window.innerWidth < 768) togglePanel(); // تصغير القائمة لرؤية النقطة على الخريطة
    }

    function order(e, name) {
        e.stopPropagation();
        cart++;
        document.getElementById("cart-count").innerText = cart;
        alert("✅ تم الإضافة: " + name);
    }

    window.onload = function() {
        let foodData = JSON.parse(localStorage.getItem('food')) || [];
        let dynamicContainer = document.getElementById('dynamic-offers-container');

        foodData.forEach((item) => {
            let cardHtml = `
                <div class="offer-card" style="border-right: 4px solid var(--orange);">
                    <span class="badge new-badge">جديد</span>
                    <h4>${item.name}</h4>
                    <p>${item.price} ريال</p>
                    <button class="btn-action" style="background:var(--orange);" onclick="order(event, '${item.name}')">
                        طلب الآن
                    </button>
                </div>
            `;
            dynamicContainer.innerHTML += cardHtml;
        });
    };
</script>

</body>
</html>
