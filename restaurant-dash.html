<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المطعم | لا تهدرها</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --orange: #ff7a00;
            --green: #2e7d32;
            --dark: #1e1e1e;
        }

        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            background: #f8f9fa;
            color: #333;
        }

        /* Sidebar - تختفي في الجوال وتتحول لقائمة سفلية */
        .sidebar {
            width: 240px;
            background: var(--dark);
            color: white;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            transition: 0.3s;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .sidebar-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--orange);
            object-fit: cover;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            width: 100%;
        }

        .sidebar li {
            padding: 14px 15px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar li:hover { background: #333; }
        .active { background: var(--orange) !important; color: white; }

        /* المحتوى الرئيسي */
        .content {
            flex: 1;
            padding: 25px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .hidden { display: none; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .grid-form { display: grid; gap: 15px; }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Tajawal';
            width: 100%;
            box-sizing: border-box;
        }

        .btn-primary {
            background: var(--orange);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-primary:hover { background: #e66e00; }

        .notif-box {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-right: 5px solid #ffc107;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #map { height: 400px; border-radius: 15px; width: 100%; z-index: 1; }

        /* --- استعلامات الوسائط للجوال (Responsive) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }

            /* تحويل القائمة الجانبية إلى قائمة سفلية تثبت أسفل الشاشة */
            .sidebar {
                width: 100%;
                height: auto;
                position: fixed;
                bottom: 0;
                top: auto;
                flex-direction: row;
                padding: 10px 0;
                z-index: 1000;
                justify-content: space-around;
                border-radius: 20px 20px 0 0;
            }

            .logo-container, .sidebar hr, .sidebar p { display: none; }

            .sidebar ul {
                display: flex;
                justify-content: space-around;
                margin: 0;
            }

            .sidebar li {
                margin-bottom: 0;
                padding: 10px;
                font-size: 12px;
                flex-direction: column;
                gap: 5px;
            }

            .content {
                padding: 15px;
                padding-bottom: 100px; /* مساحة عشان القائمة السفلية ما تغطي المحتوى */
            }

            .stat-card h3 { font-size: 16px; }
            #map { height: 300px; }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo-container">
            <img src="لاتهدرها.jpg.jpeg" class="sidebar-logo" alt="شعار لا تهدرها">
            <p style="font-size: 12px; margin-top: 10px; color: #aaa;">لوحة تحكم الشركاء</p>
        </div>

        <ul>
            <li id="btn-add" class="active" onclick="showSection('add')">📦 <span>إضافة</span></li>
            <li id="btn-track" onclick="showSection('track')">🚚 <span>تتبع</span></li>
            <li id="btn-fin" onclick="showSection('fin')">💰 <span>الاستدامة</span></li>
            <li onclick="location.href='index.html'">🏠 <span>الرئيسية</span></li>
        </ul>
    </div>

    <main class="content">

        <div id="add">
            <h2 style="margin-top:0">نشر فائض جديد</h2>
            <div class="card">
                <form onsubmit="publishFood(); return false;" class="grid-form">
                    <input id="name" placeholder="اسم الوجبة (مثلاً: وجبة شاورما)" required>
                    <select id="type">
                        <option>وجبات مطبوخة</option>
                        <option>مخبوزات</option>
                        <option>سلطات</option>
                        <option>حلويات</option>
                    </select>
                    <input id="price" type="number" placeholder="السعر المخفض (ريال)">
                    <button class="btn-primary">نشر العرض الآن</button>
                </form>
            </div>
        </div>

        <div id="track" class="hidden">
            <h2>تتبع المندوب</h2>
            <div class="notif-box">🚚 المندوب "أحمد" في الطريق لاستلام الوجبات</div>
            <div id="map"></div>
        </div>

        <div id="fin" class="hidden">
            <h2>إحصائيات التأثير</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 style="color: var(--green);">وجبات تم إنقاذها</h3>
                    <p id="meals" style="font-size: 32px; font-weight: bold; margin:10px 0;">0</p>
                </div>
                <div class="stat-card">
                    <h3 style="color: var(--orange);">الدخل المحقق</h3>
                    <p id="money" style="font-size: 32px; font-weight: bold; margin:10px 0;">0 ريال</p>
                </div>
            </div>
        </div>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        function showSection(sec) {
            document.getElementById('add').classList.add('hidden');
            document.getElementById('track').classList.add('hidden');
            document.getElementById('fin').classList.add('hidden');

            document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));

            document.getElementById(sec).classList.remove('hidden');
            document.getElementById('btn-' + sec).classList.add('active');

            if (sec === 'track') {
                setTimeout(() => {
                    map.invalidateSize();
                }, 400);
            }
        }

        function publishFood() {
            let name = document.getElementById('name').value;
            let price = document.getElementById('price').value || 0;
            let data = JSON.parse(localStorage.getItem('food')) || [];
            data.push({ name, price });
            localStorage.setItem('food', JSON.stringify(data));
            alert("تم النشر بنجاح ✅");
            document.querySelector('form').reset();
            updateStats();
        }

        function updateStats() {
            let data = JSON.parse(localStorage.getItem('food')) || [];
            document.getElementById('meals').innerText = data.length;
            let total = data.reduce((s, i) => s + Number(i.price || 0), 0);
            document.getElementById('money').innerText = total + " ريال";
        }

        var map = L.map('map').setView([21.5433, 39.1728], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([21.5433, 39.1728]).addTo(map).bindPopup("المندوب في الطريق").openPopup();

        updateStats();
    </script>

</body>
</html>
